services:
  studyroadmap:
    build: .
    container_name: studyroadmap
    restart: unless-stopped
    # Mount news.json from host so cron can update it without rebuilding
    volumes:
      - ./news.json:/usr/share/nginx/html/news.json:ro
    labels:
      - traefik.enable=true
      - "traefik.http.routers.studyroadmap.rule=Host(`studyroadmap.in`) || Host(`www.studyroadmap.in`)"
      - traefik.http.routers.studyroadmap.entrypoints=websecure
      - traefik.http.routers.studyroadmap.tls.certresolver=letsencrypt
      - traefik.http.services.studyroadmap.loadbalancer.server.port=80
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
