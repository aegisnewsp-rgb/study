name: Build & Deploy to StudyRoadmap VPS

on:
  workflow_dispatch:
  push:
  push:
    branches:
      - main
      - studyroadmap-astro

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.11
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            set -e
            cd /opt/studyroadmap-astro
            git pull origin studyroadmap-astro
            npm ci
            npm run build
            cd dist
            # Restart the Node.js backend if needed
            sudo systemctl restart studyroadmap-backend || true
            # Nginx serves /opt/studyroadmap-astro/dist as studyroadmap.in
            echo "Deploy complete at $(date)"
