server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fix: make all redirects preserve HTTPS (don't redirect to HTTP)
    absolute_redirect off;
    port_in_redirect off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml;

    # Cache static assets aggressively
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SVG and other assets
    location ~* \.(svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        expires 6m;
        add_header Cache-Control "public";
    }

    # SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
